name: CI frontend
on:
  pull_request:
    branches: [ develop ]
    paths:
      - 'frontend/**'
  workflow_dispatch:
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: static html check
        run: |
          cd frontend
          n=$(find . -name "*.html" | wc -l)
          if [ "$n" -eq 0 ]; then echo "no html files"; exit 1; fi
          echo "static frontend ok ($n html files)"
