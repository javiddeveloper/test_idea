name: CI mobile
on:
  pull_request:
    branches: [ develop ]
    paths:
      - 'mobile/**'
  workflow_dispatch:
jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: test
        run: |
          cd mobile
          chmod +x gradlew
          ./gradlew test
